<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cool Hits 2.0</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #161922;
  --surface-2: #1c1f2b;
  --surface-hover: #242838;
  --border: #2a2e3a;
  --border-light: #353a4a;
  --text: #e4e4e7;
  --text-dim: #a1a1aa;
  --text-muted: #71717a;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --green: #10b981;
  --green-dim: rgba(16,185,129,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --purple: #8b5cf6;
  --purple-dim: rgba(139,92,246,0.12);
  --pink: #ec4899;
  --pink-dim: rgba(236,72,153,0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --indigo: #6366f1;
  --indigo-dim: rgba(99,102,241,0.12);
  --gray: #6b7280;
  --gray-dim: rgba(107,114,128,0.12);
}

/* ===== LIGHT MODE ===== */
body.light {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface-2: #f0f0f2;
  --surface-hover: #e8e8ec;
  --border: #d4d4d8;
  --border-light: #c0c0c8;
  --text: #18181b;
  --text-dim: #3f3f46;
  --text-muted: #71717a;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --green: #16a34a;
  --green-dim: rgba(22,163,74,0.1);
  --red: #dc2626;
  --red-dim: rgba(220,38,38,0.08);
  --amber: #d97706;
  --amber-dim: rgba(217,119,6,0.08);
  --purple: #7c3aed;
  --purple-dim: rgba(124,58,237,0.08);
  --pink: #db2777;
  --pink-dim: rgba(219,39,119,0.08);
  --blue: #2563eb;
  --blue-dim: rgba(37,99,235,0.08);
  --indigo: #4f46e5;
  --indigo-dim: rgba(79,70,229,0.08);
  --gray: #6b7280;
  --gray-dim: rgba(107,114,128,0.08);
}

body.light .detail-date { color-scheme: light; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
.header-meta { display: flex; align-items: center; gap: 16px; }
.sync-badge { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

/* ===== ALERT BAR ===== */
.alert-bar {
  background: var(--red-dim);
  border-bottom: 1px solid rgba(239,68,68,0.2);
  padding: 8px 24px;
  font-size: 12px;
  color: var(--red);
  display: none;
}
.alert-bar.visible { display: flex; align-items: center; gap: 8px; }

/* ===== TABS ===== */
.tab-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  gap: 0;
}

.tab {
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  user-select: none;
}

.tab:hover { color: var(--text-dim); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

.tab .tab-count {
  background: var(--surface-hover);
  padding: 1px 6px;
  border-radius: 8px;
  font-size: 11px;
  margin-left: 6px;
  color: var(--text-dim);
}

/* ===== QUICK ADD ===== */
.quick-add {
  padding: 12px 24px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
}

.quick-add input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 14px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}

.quick-add input:focus { border-color: var(--accent); }
.quick-add input::placeholder { color: var(--text-muted); }

.quick-add select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 10px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  cursor: pointer;
}

.quick-add button {
  background: var(--accent);
  border: none;
  border-radius: 8px;
  padding: 9px 16px;
  color: white;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}

.quick-add button:hover { background: var(--accent-hover); }

/* ===== BOARD LAYOUT ===== */
.board {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}

.board-column {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 200px;
}

.board-column:nth-child(3n) { border-right: none; }

/* ===== COMPLETED SECTION ===== */
.completed-section {
  border-top: 1px solid var(--border);
  background: var(--surface);
  margin: 0;
}

.completed-header {
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-muted);
  transition: color 0.15s;
}

.completed-header:hover { color: var(--text-dim); }

.completed-header .arrow {
  display: inline-block;
  transition: transform 0.2s;
  font-size: 10px;
}

.completed-header .arrow.open { transform: rotate(90deg); }

.completed-body {
  display: none;
  padding: 8px 24px 16px;
}

.completed-body.open { display: block; }

.completed-body .task-card {
  max-width: 500px;
  margin-bottom: 6px;
}

.col-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}

.col-header h3 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}

.col-header .col-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.col-count {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--surface);
  padding: 2px 7px;
  border-radius: 8px;
}

.col-body {
  padding: 8px;
  flex: 1;
  overflow-y: auto;
  min-height: 100px;
}

.col-body.drag-over {
  background: rgba(99,102,241,0.05);
}

/* ===== TASK CARDS ===== */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 6px;
  cursor: grab;
  transition: all 0.15s;
  position: relative;
}

.task-card:hover { border-color: var(--border-light); background: var(--surface-2); }
.task-card.dragging { opacity: 0.4; }
.task-card.completed { opacity: 0.45; }
.task-card.completed .task-name { text-decoration: line-through; }

.task-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.task-check {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid var(--border-light);
  flex-shrink: 0;
  margin-top: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.task-check:hover { border-color: var(--green); }
.task-card.completed .task-check {
  background: var(--green);
  border-color: var(--green);
}
.task-card.completed .task-check::after {
  content: '\2713';
  color: white;
  font-size: 10px;
  font-weight: 700;
}

.task-content { flex: 1; min-width: 0; }

.task-name {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.35;
  margin-bottom: 6px;
}

.task-name a {
  color: inherit;
  text-decoration: none;
}

.task-name a:hover { color: var(--accent-hover); }

.task-badges {
  display: flex;
  gap: 5px;
  align-items: center;
  flex-wrap: wrap;
}

.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.badge-critical { background: var(--red-dim); color: var(--red); }
.badge-boulder { background: var(--purple-dim); color: var(--purple); }
.badge-pebble { background: var(--indigo-dim); color: var(--indigo); }
.badge-high { background: var(--red-dim); color: var(--red); }
.badge-medium { background: var(--amber-dim); color: var(--amber); }
.badge-low { background: var(--gray-dim); color: var(--gray); }

.badge-seo { background: var(--blue-dim); color: var(--blue); }
.badge-content { background: var(--pink-dim); color: var(--pink); }
.badge-local { background: var(--gray-dim); color: var(--gray); }

.badge-status-progress { background: var(--blue-dim); color: var(--blue); }
.badge-status-deck { background: var(--amber-dim); color: var(--amber); }
.badge-status-blocked { background: var(--red-dim); color: var(--red); }
.badge-status-notstarted { background: var(--gray-dim); color: var(--gray); }

.badge-project {
  background: var(--green-dim);
  color: var(--green);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  letter-spacing: 0.2px;
  white-space: nowrap;
}

.badge-project-hub {
  background: var(--green);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  letter-spacing: 0.2px;
  white-space: nowrap;
}

.task-card.project-hub { border-left: 3px solid var(--green); }
.list-row.project-hub { border-left: 3px solid var(--green); }

/* ===== PROJECT FILTER ===== */
.project-filter {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  color: var(--text);
  font-size: 11px;
  outline: none;
  cursor: pointer;
}

.task-due {
  font-size: 10px;
  color: var(--text-muted);
}

.task-due.overdue { color: var(--red); font-weight: 600; }

.task-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  display: none;
  gap: 4px;
}

.task-card:hover .task-actions { display: flex; }

.task-action-btn {
  background: var(--surface-hover);
  border: none;
  border-radius: 4px;
  padding: 3px 6px;
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}

.task-action-btn:hover { background: var(--border); color: var(--text); }
.task-action-btn.delete:hover { background: var(--red-dim); color: var(--red); }

/* ===== EXPANDABLE DETAIL / NOTES ===== */

.task-detail {
  display: none;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

.task-detail.open { display: block; }

/* ===== COMMENT FEED ===== */
.comment-composer {
  display: flex;
  gap: 6px;
  align-items: flex-start;
  margin-bottom: 8px;
}

.comment-input {
  flex: 1;
  min-height: 32px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  color: var(--text);
  font-size: 12px;
  font-family: inherit;
  line-height: 1.4;
  resize: none;
  outline: none;
  overflow: hidden;
  transition: border-color 0.15s;
}

.comment-input:focus { border-color: var(--accent); }
.comment-input::placeholder { color: var(--text-muted); }

.comment-post-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}

.comment-post-btn:hover { background: var(--accent-hover); }

.comment-monday-toggle {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}

.comment-monday-toggle input[type="checkbox"] {
  accent-color: var(--accent);
  margin: 0;
}

.comment-feed {
  max-height: 400px;
  overflow-y: auto;
  transition: max-height 0.2s;
}

.comment-feed.expanded { max-height: none; }

.comment-item {
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  line-height: 1.5;
}

.comment-item:last-child { border-bottom: none; }

.comment-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
  font-size: 10px;
  color: var(--text-muted);
}

.comment-source-badge {
  font-size: 9px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 3px;
}

.comment-source-badge.monday { background: var(--blue-dim); color: var(--blue); }
.comment-source-badge.local { background: var(--gray-dim); color: var(--text-muted); }
.comment-source-badge.pending { background: var(--amber-dim); color: var(--amber); }

.comment-actions {
  margin-left: auto;
  display: flex;
  gap: 6px;
  opacity: 0;
  transition: opacity 0.15s;
}

.comment-item:hover .comment-actions { opacity: 1; }

.comment-action {
  cursor: pointer;
  color: var(--text-muted);
  font-size: 10px;
  transition: color 0.15s;
}

.comment-action:hover { color: var(--text); }
.comment-action.delete:hover { color: var(--red); }

.comment-edit-area {
  width: 100%;
  min-height: 32px;
  background: var(--bg);
  border: 1px solid var(--accent);
  border-radius: 6px;
  padding: 6px 10px;
  color: var(--text);
  font-size: 12px;
  font-family: inherit;
  line-height: 1.4;
  resize: none;
  outline: none;
  overflow: hidden;
}

.comment-edit-actions {
  display: flex;
  gap: 6px;
  margin-top: 4px;
}

.comment-edit-actions button {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  font-weight: 500;
}

.comment-edit-actions .save-btn { background: var(--accent); color: #fff; }
.comment-edit-actions .save-btn:hover { background: var(--accent-hover); }
.comment-edit-actions .cancel-btn { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }
.comment-edit-actions .cancel-btn:hover { background: var(--surface-hover); }

.comment-text {
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}

.comment-text a {
  color: var(--accent-hover);
  text-decoration: underline;
  text-decoration-color: rgba(129,140,248,0.4);
}

.comment-text a:hover { text-decoration-color: var(--accent-hover); }

.comment-show-toggle {
  font-size: 10px;
  color: var(--accent);
  cursor: pointer;
  padding: 4px 0;
  user-select: none;
}

.comment-show-toggle:hover { color: var(--accent-hover); }

.comment-empty {
  font-size: 11px;
  color: var(--text-muted);
  padding: 4px 0;
  font-style: italic;
}

.task-detail-meta {
  display: flex;
  gap: 8px;
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-muted);
  flex-wrap: wrap;
}

.task-detail-meta span { display: flex; align-items: center; gap: 3px; }

.task-detail-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.detail-field {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.detail-field label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.detail-select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 5px 8px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s;
}

.detail-select:focus { border-color: var(--accent); }
.detail-select:hover { border-color: var(--border-light); }

.detail-date {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 5px 8px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s;
  color-scheme: dark;
}

.detail-date:focus { border-color: var(--accent); }
.detail-date:hover { border-color: var(--border-light); }

/* ===== TAB CONTENT ===== */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ===== VIEW CONTROLS ===== */
.view-controls {
  padding: 8px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.view-controls label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.view-toggle {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.view-toggle-btn {
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  background: var(--surface);
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}

.view-toggle-btn:not(:last-child) { border-right: 1px solid var(--border); }
.view-toggle-btn:hover { color: var(--text-dim); background: var(--surface-hover); }
.view-toggle-btn.active { background: var(--accent); color: white; }

.group-select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  color: var(--text);
  font-size: 11px;
  outline: none;
  cursor: pointer;
}

/* ===== LIST VIEW ===== */
.list-view { padding: 0; }

.list-group {
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}

.list-group:last-child { margin-bottom: 0; }

.list-group-header {
  padding: 8px 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.list-group-header:hover { background: var(--surface-2); }

.list-group-header .arrow {
  font-size: 9px;
  display: inline-block;
  transition: transform 0.15s;
}

.list-group-header .arrow.open { transform: rotate(90deg); }

.list-group-header h3 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}

.list-group-header .col-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.list-group-header .col-count {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg);
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: auto;
}

.list-group-body { }

.list-group-body.collapsed { display: none; }

.list-row {
  display: flex;
  align-items: flex-start;
  padding: 8px 24px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  cursor: pointer;
  transition: background 0.15s;
}

.list-row:hover { background: var(--surface); }
.list-row:last-child { border-bottom: none; }

.list-row.completed { opacity: 0.45; }
.list-row.completed .list-row-name { text-decoration: line-through; }

.list-row-check {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid var(--border-light);
  flex-shrink: 0;
  margin-top: 1px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.list-row-check:hover { border-color: var(--green); }

.list-row.completed .list-row-check {
  background: var(--green);
  border-color: var(--green);
}

.list-row.completed .list-row-check::after {
  content: '\2713';
  color: white;
  font-size: 10px;
  font-weight: 700;
}

.list-row-content { flex: 1; min-width: 0; }

.list-row-name {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.3;
  margin-bottom: 2px;
}

.list-row-name a { color: inherit; text-decoration: none; }
.list-row-name a:hover { color: var(--accent-hover); }

.list-row-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}

.list-row-detail {
  display: none;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

.list-row-detail.open { display: block; }

.list-row-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.15s;
}

.list-row:hover .list-row-actions { opacity: 1; }

/* ===== EMPTY STATE ===== */
.empty-state {
  padding: 32px 16px;
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===== RESPONSIVE ===== */
@media (max-width: 1000px) {
  .board { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 768px) {
  .board { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>Cool Hits 2.0</h1>
  <div class="header-meta">
    <div class="sync-badge"><span class="sync-dot"></span> <span id="syncTime">Synced just now</span></div>
    <button onclick="toggleTheme()" id="themeToggle" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text-dim);font-size:12px;cursor:pointer;transition:all 0.15s;">Light</button>
  </div>
</div>

<!-- ALERT BAR -->
<div class="alert-bar" id="alertBar"></div>

<!-- MAIN TABS -->
<div class="tab-bar">
  <div class="tab active" data-tab="work" onclick="switchTab('work')">Work <span class="tab-count" id="workCount">0</span></div>
  <div class="tab" data-tab="personal" onclick="switchTab('personal')">Personal <span class="tab-count" id="personalCount">0</span></div>
</div>

<!-- ==================== WORK TAB ==================== -->
<div class="tab-content active" id="tab-work">
  <!-- TASKS VIEW -->
  <div id="view-tasks-work">
    <div class="view-controls">
      <label>View</label>
      <div class="view-toggle">
        <button class="view-toggle-btn active" onclick="setViewMode('board','work')" id="work-view-board">Board</button>
        <button class="view-toggle-btn" onclick="setViewMode('list','work')" id="work-view-list">List</button>
      </div>
      <label>Group by</label>
      <select class="group-select" id="workGroupBy" onchange="setGrouping(this.value,'work')">
        <option value="timeline">Timeline</option>
        <option value="priority">Priority</option>
        <option value="source">Source</option>
        <option value="status">Status</option>
        <option value="project">Project</option>
      </select>
      <label style="margin-left:auto;">Project</label>
      <select class="project-filter" id="workProjectFilter" onchange="setProjectFilter(this.value,'work')">
        <option value="">All Projects</option>
      </select>
    </div>

    <!-- Quick Add -->
    <div class="quick-add">
      <input type="text" id="workTaskName" placeholder="Task name..." />
      <select id="workAddBucket">
        <option value="Today">Today</option>
        <option value="Tomorrow">Tomorrow</option>
        <option value="This Week">This Week</option>
        <option value="Later">Later</option>
        <option value="Backlog">Backlog</option>
      </select>
      <select id="workAddPriority">
        <option value="">- Priority -</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <select id="workAddProject">
        <option value="">No Project</option>
      </select>
      <button onclick="addWorkTask()">Add</button>
    </div>

    <!-- Board/List Container -->
    <div id="workContainer" style="padding:0;"></div>
  </div>
</div>

<!-- ==================== PERSONAL TAB ==================== -->
<div class="tab-content" id="tab-personal">
  <!-- TASKS VIEW -->
  <div id="view-tasks-personal">
    <div class="view-controls">
      <label>View</label>
      <div class="view-toggle">
        <button class="view-toggle-btn active" onclick="setViewMode('board','personal')" id="personal-view-board">Board</button>
        <button class="view-toggle-btn" onclick="setViewMode('list','personal')" id="personal-view-list">List</button>
      </div>
      <label>Group by</label>
      <select class="group-select" id="personalGroupBy" onchange="setGrouping(this.value,'personal')">
        <option value="timeline">Timeline</option>
        <option value="priority">Priority</option>
        <option value="source">Source</option>
        <option value="status">Status</option>
        <option value="project">Project</option>
      </select>
      <label style="margin-left:auto;">Project</label>
      <select class="project-filter" id="personalProjectFilter" onchange="setProjectFilter(this.value,'personal')">
        <option value="">All Projects</option>
      </select>
    </div>

    <!-- Quick Add -->
    <div class="quick-add">
      <input type="text" id="personalTaskName" placeholder="Task name..." />
      <select id="personalAddBucket">
        <option value="Today">Today</option>
        <option value="Tomorrow">Tomorrow</option>
        <option value="This Week">This Week</option>
        <option value="Later">Later</option>
        <option value="Backlog">Backlog</option>
      </select>
      <select id="personalAddPriority">
        <option value="">- Priority -</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <select id="personalAddProject">
        <option value="">No Project</option>
      </select>
      <button onclick="addPersonalTask()">Add</button>
    </div>

    <!-- Board/List Container -->
    <div id="personalContainer" style="padding:0;"></div>
  </div>
</div>

<script>
/* ===== STATE ===== */
var LAST_SYNC = "";

var WORK_TASKS = [];

var PERSONAL_TASKS = [];

var nextWorkId = 1;
var nextPersonalId = 1;

var viewMode = { work: 'board', personal: 'board' };
var groupBy = { work: 'timeline', personal: 'timeline' };
var projectFilter = { work: '', personal: '' };

var GROUPINGS = {
  timeline: { label: 'Timeline', groups: ['Today','Tomorrow','This Week','Later','Backlog'], colors: { 'Today':'#10b981', 'Tomorrow':'#3b82f6', 'This Week':'#f59e0b', 'Later':'#8b5cf6', 'Backlog':'#6b7280' } },
  priority: { label: 'Priority', groups: ['critical','high','medium','low'], colors: { 'critical':'#ef4444', 'high':'#f59e0b', 'medium':'#3b82f6', 'low':'#6b7280' } },
  source: { label: 'Source', groups: ['seo','content','local'], colors: { 'seo':'#3b82f6', 'content':'#ec4899', 'local':'#6b7280' } },
  status: { label: 'Status', groups: ['not-started','in-progress','blocked','done'], colors: { 'not-started':'#6b7280', 'in-progress':'#3b82f6', 'blocked':'#ef4444', 'done':'#10b981' } },
  project: { label: 'Project', groups: [], colors: {} }
};

function buildProjectGrouping(tasks) {
  var projects = {};
  tasks.forEach(function(t) {
    if (t.project) projects[t.project] = true;
  });
  var labels = Object.keys(projects).sort();
  var colors = {};
  labels.forEach(function(p) { colors[p] = '#10b981'; });
  GROUPINGS.project.groups = labels;
  GROUPINGS.project.labels = labels;
  GROUPINGS.project.colors = colors;
}

function setViewMode(mode, scope) {
  viewMode[scope] = mode;
  document.getElementById(scope+'-view-board').classList.toggle('active', mode === 'board');
  document.getElementById(scope+'-view-list').classList.toggle('active', mode === 'list');
  scope === 'work' ? renderWorkBoard() : renderPersonalBoard();
}

function setGrouping(g, scope) {
  groupBy[scope] = g;
  scope === 'work' ? renderWorkBoard() : renderPersonalBoard();
}

function setProjectFilter(val, scope) {
  projectFilter[scope] = val;
  scope === 'work' ? renderWorkBoard() : renderPersonalBoard();
}

function applyProjectFilter(tasks, scope) {
  var filter = projectFilter[scope];
  if (!filter) return tasks;
  return tasks.filter(function(t) { return t.project === filter; });
}

function populateProjectFilter(tasks, selectId) {
  var projects = {};
  tasks.forEach(function(t) {
    if (t.project) projects[t.project] = true;
  });
  var sorted = Object.keys(projects).sort();
  var sel = document.getElementById(selectId);
  if (!sel) return;
  var current = sel.value;
  sel.innerHTML = '<option value="">All Projects</option>';
  sorted.forEach(function(p) {
    sel.innerHTML += '<option value="'+escHtml(p)+'"'+(p===current?' selected':'')+'>'+escHtml(p)+'</option>';
  });
  var scope = selectId.indexOf('work') >= 0 ? 'work' : 'personal';
  var dl = document.getElementById('projectList-'+scope);
  if (dl) {
    dl.innerHTML = sorted.map(function(p){ return '<option value="'+escHtml(p)+'">'; }).join('');
  }
  var addSel = document.getElementById(scope+'AddProject');
  if (addSel) {
    var curVal = addSel.value;
    addSel.innerHTML = '<option value="">No Project</option>';
    sorted.forEach(function(p) {
      addSel.innerHTML += '<option value="'+escHtml(p)+'"'+(p===curVal?' selected':'')+'>'+escHtml(p)+'</option>';
    });
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelector('[data-tab="'+tab+'"]').classList.add('active');
  document.querySelectorAll('.tab-content').forEach(function(c){ c.classList.remove('active'); });
  document.getElementById('tab-'+tab).classList.add('active');
  try { localStorage.setItem('coolhits_activeTab', tab); } catch(e) {}
}

function escHtml(s) {
  var div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function linkify(text) {
  return text.replace(/https?:\/\/[^\s]+/g, function(url) { return '<a href="'+escHtml(url)+'" target="_blank">'+escHtml(url.substring(0,40)+'...')+'</a>'; });
}

function priorityBadge(p) {
  if (!p) return '';
  var badgeClass = 'badge-'+p;
  return '<span class="badge '+badgeClass+'">'+escHtml(p.toUpperCase())+'</span>';
}

function sourceBadge(s) {
  if (!s) return '';
  var badgeClass = 'badge-'+s;
  return '<span class="badge '+badgeClass+'">'+escHtml(s.toUpperCase())+'</span>';
}

function projectBadge(task) {
  if (!task.project) return '';
  var isHub = task.isProjectHub ? ' badge-project-hub' : '';
  return '<span class="badge-project'+isHub+'">'+escHtml(task.project)+'</span>';
}

function statusBadge(st) {
  if (!st) return '';
  var badgeClass = 'badge-status-'+st.replace(/\s+/g,'-').toLowerCase();
  return '<span class="badge '+badgeClass+'">'+escHtml(st.toUpperCase())+'</span>';
}

function dueBadge(d) {
  if (!d) return '';
  var due = new Date(d);
  var today = new Date();
  today.setHours(0,0,0,0);
  due.setHours(0,0,0,0);
  var overdue = due < today;
  var cls = overdue ? ' overdue' : '';
  var fmt = d.substring(5,10).replace('-','/');
  return '<span class="task-due'+cls+'">'+escHtml(fmt)+'</span>';
}

function renderTaskCard(task, scope) {
  var html = '<div class="task-card'+(task.status==='done'?' completed':'')+' '+(task.isProjectHub?'project-hub':'')+'" draggable="true" ondragstart="onDragStart(event,'+task.id+',\''+scope+'\')" ondragend="onDragEnd(event)" id="task-'+scope+'-'+task.id+'">';
  html += '<div class="task-top">';
  html += '<div class="task-check" onclick="toggleComplete('+task.id+',\''+scope+'\')"></div>';
  html += '<div class="task-content">';
  html += '<div class="task-name" onclick="toggleDetail('+task.id+',\''+scope+'\',event)">'+linkify(escHtml(task.name))+'</div>';
  html += '<div class="task-badges">'+priorityBadge(task.priority)+sourceBadge(task.source)+statusBadge(task.status)+projectBadge(task)+dueBadge(task.due)+'</div>';
  if (task.comments && task.comments.length > 0) {
    html += '<div style="font-size:10px;color:var(--text-muted);margin-top:2px;">💬 '+task.comments.length+'</div>';
  }
  html += '</div>';
  html += '<div class="task-actions"><button class="task-action-btn delete" onclick="deleteTask('+task.id+',\''+scope+'\')">Del</button></div>';
  html += '</div>';
  html += renderDetailPanel(task, scope);
  html += '</div>';
  return html;
}

function renderListView(tasks, scope, container) {
  var html = '<div class="list-view">';
  var grouping = GROUPINGS[groupBy[scope]];
  var groups = grouping.groups;
  if (groupBy[scope] === 'project') {
    buildProjectGrouping(tasks);
    groups = GROUPINGS.project.groups;
  }
  groups.forEach(function(grp) {
    var grpTasks = tasks.filter(function(t) {
      var val = t[groupBy[scope]] || 'none';
      return val === grp;
    });
    var dotColor = grouping.colors[grp] || '#6b7280';
    html += '<div class="list-group">';
    html += '<div class="list-group-header" onclick="toggleListGroup(this)">';
    html += '<span class="arrow">▶</span>';
    html += '<h3><span class="col-dot" style="background:'+dotColor+'"></span>'+escHtml(grp)+'</h3>';
    html += '<span class="col-count">'+grpTasks.length+'</span>';
    html += '</div>';
    html += '<div class="list-group-body">';
    grpTasks.forEach(function(task) {
      html += renderListRow(task, scope);
    });
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function renderListRow(task, scope) {
  var html = '<div class="list-row'+(task.status==='done'?' completed':'')+' '+(task.isProjectHub?'project-hub':'')+'" onclick="toggleListDetail(\''+task.id+'\',\''+scope+'\',event)">';
  html += '<div class="list-row-check" onclick="event.stopPropagation();toggleComplete('+task.id+',\''+scope+'\')"></div>';
  html += '<div class="list-row-content">';
  html += '<div class="list-row-name">'+linkify(escHtml(task.name))+'</div>';
  html += '<div class="list-row-badges">'+priorityBadge(task.priority)+sourceBadge(task.source)+statusBadge(task.status)+projectBadge(task)+dueBadge(task.due)+'</div>';
  html += '</div>';
  html += '</div>';
  var detailId = 'list-detail-'+scope+'-'+task.id;
  html += '<div class="list-row-detail" id="'+detailId+'">'+renderDetailPanel(task, scope)+'</div>';
  return html;
}

function toggleListGroup(header) {
  var body = header.nextElementSibling;
  body.classList.toggle('collapsed');
}

function toggleListDetail(taskId, scope, event) {
  if (event.target.classList.contains('task-action-btn')) return;
  var detailId = 'list-detail-'+scope+'-'+taskId;
  var detail = document.getElementById(detailId);
  if (detail) detail.classList.toggle('open');
}

function renderDetailPanel(task, scope) {
  var html = '<div class="task-detail" id="detail-'+scope+'-'+task.id+'">';
  html += '<div class="task-detail-controls">';
  html += '<div class="detail-field"><label>Name</label><input type="text" style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;" value="'+escHtml(task.name)+'" onchange="changeField('+task.id+',\''+scope+'\',\'name\',this.value)" /></div>';
  html += '<div class="detail-field"><label>Status</label><select class="detail-select" onchange="changeField('+task.id+',\''+scope+'\',\'status\',this.value)">'+statusOptions(task.status)+'</select></div>';
  html += '<div class="detail-field"><label>Priority</label><select class="detail-select" onchange="changeField('+task.id+',\''+scope+'\',\'priority\',this.value)">'+priorityOptions(task.priority)+'</select></div>';
  html += '<div class="detail-field"><label>Timeline</label><select class="detail-select" onchange="changeField('+task.id+',\''+scope+'\',\'timeline\',this.value)"><option value="Today"'+(task.timeline==='Today'?' selected':'')+'>Today</option><option value="Tomorrow"'+(task.timeline==='Tomorrow'?' selected':'')+'>Tomorrow</option><option value="This Week"'+(task.timeline==='This Week'?' selected':'')+'>This Week</option><option value="Later"'+(task.timeline==='Later'?' selected':'')+'>Later</option><option value="Backlog"'+(task.timeline==='Backlog'?' selected':'')+'>Backlog</option></select></div>';
  html += '<div class="detail-field"><label>Due Date</label><input type="date" class="detail-date" value="'+(task.due || '')+'" onchange="changeField('+task.id+',\''+scope+'\',\'due\',this.value)" /></div>';
  html += '<div class="detail-field"><label>Project</label><input type="text" list="projectList-'+scope+'" style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;" value="'+(task.project || '')+'" onchange="changeField('+task.id+',\''+scope+'\',\'project\',this.value)" /><datalist id="projectList-'+scope+'"></datalist></div>';
  html += '<label style="display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer;"><input type="checkbox" '+(task.isProjectHub?'checked':'')+' onchange="changeField('+task.id+',\''+scope+'\',\'isProjectHub\',this.checked)" style="accent-color:var(--accent);" /> Hub Task</label>';
  html += '</div>';
  html += '<div class="comment-composer"><textarea class="comment-input" id="comment-input-'+scope+'-'+task.id+'" placeholder="Add a comment..." style="min-height:40px;"></textarea><button class="comment-post-btn" onclick="postComment('+task.id+',\''+scope+'\')">Post</button></div>';
  html += '<div class="comment-feed" id="comment-feed-'+scope+'-'+task.id+'">';
  if (task.comments && task.comments.length > 0) {
    if (task.comments.length > 3) {
      html += '<div class="comment-show-toggle" onclick="toggleCommentExpand('+task.id+')">Show all '+task.comments.length+' comments</div>';
    }
    task.comments.forEach(function(c, idx) {
      html += '<div class="comment-item">';
      html += '<div class="comment-header">';
      html += '<span style="color:var(--text-dim);font-weight:500;">Local</span>';
      html += '<span class="comment-source-badge local">LOCAL</span>';
      html += '<span style="color:var(--text-muted);font-size:10px;">'+escHtml((c.date || 'just now').substring(0,10))+'</span>';
      html += '<div class="comment-actions"><span class="comment-action" onclick="editComment('+task.id+',\''+scope+'\','+idx+')">Edit</span><span class="comment-action delete" onclick="deleteComment('+task.id+',\''+scope+'\','+idx+')">Delete</span></div>';
      html += '</div>';
      html += '<div class="comment-text" id="comment-text-'+scope+'-'+task.id+'-'+idx+'">'+linkify(escHtml(c.text))+'</div>';
      html += '<div class="comment-edit-area" id="comment-edit-'+scope+'-'+task.id+'-'+idx+'" style="display:none;" onkeyup="autoGrow(this)">'+escHtml(c.text)+'</div>';
      html += '<div class="comment-edit-actions" id="comment-edit-actions-'+scope+'-'+task.id+'-'+idx+'" style="display:none;"><button class="save-btn" onclick="saveCommentEdit('+task.id+',\''+scope+'\','+idx+')">Save</button><button class="cancel-btn" onclick="cancelCommentEdit('+task.id+',\''+scope+'\','+idx+')">Cancel</button></div>';
      html += '</div>';
    });
  } else {
    html += '<div class="comment-empty">No comments yet</div>';
  }
  html += '</div>';
  html += '</div>';
  return html;
}

function renderBoardGrouped(tasks, scope, boardEl, colPrefix) {
  var grouping = GROUPINGS[groupBy[scope]];
  var groups = grouping.groups;
  if (groupBy[scope] === 'project') {
    buildProjectGrouping(tasks);
    groups = GROUPINGS.project.groups;
  }
  var html = '<div class="board">';
  groups.forEach(function(grp) {
    var grpTasks = tasks.filter(function(t) {
      var val = t[groupBy[scope]] || 'none';
      return val === grp;
    });
    var dotColor = grouping.colors[grp] || '#6b7280';
    html += '<div class="board-column" ondragover="event.preventDefault(); this.classList.add(\'drag-over\')" ondragleave="this.classList.remove(\'drag-over\')" ondrop="dropTask(event,\''+grp+'\',\''+scope+'\'); this.classList.remove(\'drag-over\')" id="col-'+colPrefix+'-'+grp.replace(/\s+/g,'-')+'">';
    html += '<div class="col-header"><h3><span class="col-dot" style="background:'+dotColor+'"></span>'+escHtml(grp)+'</h3><span class="col-count">'+grpTasks.length+'</span></div>';
    html += '<div class="col-body">';
    grpTasks.forEach(function(task) {
      html += renderTaskCard(task, scope);
    });
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  if (tasks.some(function(t){ return t.status === 'done'; })) {
    var doneTasks = tasks.filter(function(t) { return t.status === 'done'; });
    html += '<div class="completed-section">';
    html += '<div class="completed-header" onclick="toggleCompletedSection(\''+scope+'\')">';
    html += '<span class="arrow">▶</span>';
    html += '<span>COMPLETED ('+doneTasks.length+')</span>';
    html += '</div>';
    html += '<div class="completed-body" id="completed-body-'+scope+'">';
    doneTasks.forEach(function(task) {
      html += renderTaskCard(task, scope);
    });
    html += '</div>';
    html += '</div>';
  }
  boardEl.innerHTML = html;
}

function renderWorkBoard() {
  var tasks = applyProjectFilter(WORK_TASKS, 'work');
  var container = document.getElementById('workContainer');
  if (viewMode.work === 'board') {
    renderBoardGrouped(tasks, 'work', container, 'work');
  } else {
    renderListView(tasks, 'work', container);
  }
  populateProjectFilter(WORK_TASKS, 'workProjectFilter');
  document.getElementById('workCount').textContent = WORK_TASKS.length;
}

function renderPersonalBoard() {
  var tasks = applyProjectFilter(PERSONAL_TASKS, 'personal');
  var container = document.getElementById('personalContainer');
  if (viewMode.personal === 'board') {
    renderBoardGrouped(tasks, 'personal', container, 'personal');
  } else {
    renderListView(tasks, 'personal', container);
  }
  populateProjectFilter(PERSONAL_TASKS, 'personalProjectFilter');
  document.getElementById('personalCount').textContent = PERSONAL_TASKS.length;
}

function updateAlerts() {
  var alerts = [];
  WORK_TASKS.forEach(function(t) {
    if (t.due) {
      var due = new Date(t.due);
      var today = new Date();
      today.setHours(0,0,0,0);
      if (due < today && t.status !== 'done') alerts.push(t);
    }
  });
  PERSONAL_TASKS.forEach(function(t) {
    if (t.due) {
      var due = new Date(t.due);
      var today = new Date();
      today.setHours(0,0,0,0);
      if (due < today && t.status !== 'done') alerts.push(t);
    }
  });
  var alertBar = document.getElementById('alertBar');
  if (alerts.length > 0) {
    alertBar.innerHTML = '<span style="color:var(--red);font-weight:600;">'+alerts.length+' overdue task'+(alerts.length!==1?'s':'')+'</span>';
    alertBar.classList.add('visible');
  } else {
    alertBar.classList.remove('visible');
  }
}

function toggleComplete(id, scope) {
  var tasks = scope === 'work' ? WORK_TASKS : PERSONAL_TASKS;
  var task = tasks.find(function(t) { return t.id === id; });
  if (task) {
    task.status = task.status === 'done' ? 'not-started' : 'done';
    saveState();
    scope === 'work' ? renderWorkBoard() : renderPersonalBoard();
    updateAlerts();
  }
}

function toggleCompletedSection(scope) {
  var body = document.getElementById('completed-body-'+scope);
  if (body) body.classList.toggle('open');
}

function deleteTask(id, scope) {
  if (!confirm('Delete this task?')) return;
  if (scope === 'work') {
    WORK_TASKS = WORK_TASKS.filter(function(t) { return t.id !== id; });
  } else {
    PERSONAL_TASKS = PERSONAL_TASKS.filter(function(t) { return t.id !== id; });
  }
  saveState();
  scope === 'work' ? renderWorkBoard() : renderPersonalBoard();
}

function addWorkTask() {
  var name = document.getElementById('workTaskName').value.trim();
  if (!name) return;
  var task = {
    id: nextWorkId++,
    name: name,
    timeline: document.getElementById('workAddBucket').value,
    priority: document.getElementById('workAddPriority').value || '',
    project: document.getElementById('workAddProject').value || '',
    source: '',
    status: 'not-started',
    isProjectHub: false,
    due: '',
    comments: []
  };
  WORK_TASKS.push(task);
  document.getElementById('workTaskName').value = '';
  saveState();
  renderWorkBoard();
}

function addPersonalTask() {
  var name = document.getElementById('personalTaskName').value.trim();
  if (!name) return;
  var task = {
    id: nextPersonalId++,
    name: name,
    timeline: document.getElementById('personalAddBucket').value,
    priority: document.getElementById('personalAddPriority').value || '',
    project: document.getElementById('personalAddProject').value || '',
    source: '',
    status: 'not-started',
    isProjectHub: false,
    due: '',
    comments: []
  };
  PERSONAL_TASKS.push(task);
  document.getElementById('personalTaskName').value = '';
  saveState();
  renderPersonalBoard();
}

function onDragStart(e, taskId, scope) {
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', scope + ':' + taskId);
  var card = document.getElementById('task-'+scope+'-'+taskId);
  if (card) card.classList.add('dragging');
}

function onDragEnd(e) {
  document.querySelectorAll('.task-card.dragging').forEach(function(c) { c.classList.remove('dragging'); });
  document.querySelectorAll('.col-body.drag-over').forEach(function(c) { c.classList.remove('drag-over'); });
}

function dropTask(e, groupVal, scope) {
  e.preventDefault();
  var data = e.dataTransfer.getData('text/plain');
  var parts = data.split(':');
  var dragScope = parts[0];
  var taskId = parseInt(parts[1]);
  if (dragScope === scope) {
    var tasks = scope === 'work' ? WORK_TASKS : PERSONAL_TASKS;
    var task = tasks.find(function(t) { return t.id === taskId; });
    if (task) {
      task[groupBy[scope]] = groupVal;
      saveState();
      scope === 'work' ? renderWorkBoard() : renderPersonalBoard();
    }
  }
}

function statusOptions(current) {
  var opts = ['not-started','in-progress','blocked','done'];
  var html = '';
  opts.forEach(function(o) {
    html += '<option value="'+o+'"'+(o===current?' selected':'')+'>'+o.toUpperCase()+'</option>';
  });
  return html;
}

function priorityOptions(current) {
  var opts = ['critical','high','medium','low',''];
  var html = '';
  opts.forEach(function(o) {
    html += '<option value="'+o+'"'+(o===current?' selected':'')+'>'+o.toUpperCase()+'</option>';
  });
  return html;
}

function groupOptions(current) {
  var opts = ['timeline','priority','source','status','project'];
  var html = '';
  opts.forEach(function(o) {
    html += '<option value="'+o+'"'+(o===current?' selected':'')+'>'+o.toUpperCase()+'</option>';
  });
  return html;
}

function changeField(taskId, scope, field, value) {
  var tasks = scope === 'work' ? WORK_TASKS : PERSONAL_TASKS;
  var task = tasks.find(function(t) { return t.id === taskId; });
  if (task) {
    task[field] = value;
    saveState();
    scope === 'work' ? renderWorkBoard() : renderPersonalBoard();
  }
}

function toggleDetail(taskId, scope, event) {
  if (event && event.target && event.target.classList.contains('task-check')) return;
  var detail = document.getElementById('detail-'+scope+'-'+taskId);
  if (detail) detail.classList.toggle('open');
}

function postComment(taskId, scope) {
  var textarea = document.getElementById('comment-input-'+scope+'-'+taskId);
  var text = textarea.value.trim();
  if (!text) return;
  var tasks = scope === 'work' ? WORK_TASKS : PERSONAL_TASKS;
  var task = tasks.find(function(t) { return t.id === taskId; });
  if (task) {
    if (!task.comments) task.comments = [];
    var date = new Date().toISOString().substring(0,10);
    task.comments.push({ text: text, date: date });
    textarea.value = '';
    saveState();
    scope === 'work' ? renderWorkBoard() : renderPersonalBoard();
    var detail = document.getElementById('detail-'+scope+'-'+taskId);
    if (detail) detail.classList.add('open');
  }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function deleteComment(taskId, scope, index) {
  var tasks = scope === 'work' ? WORK_TASKS : PERSONAL_TASKS;
  var task = tasks.find(function(t) { return t.id === taskId; });
  if (task && task.comments) {
    task.comments.splice(index, 1);
    saveState();
    scope === 'work' ? renderWorkBoard() : renderPersonalBoard();
  }
}

function editComment(taskId, scope, index) {
  var textEl = document.getElementById('comment-text-'+scope+'-'+taskId+'-'+index);
  var editEl = document.getElementById('comment-edit-'+scope+'-'+taskId+'-'+index);
  var actionsEl = document.getElementById('comment-edit-actions-'+scope+'-'+taskId+'-'+index);
  if (textEl && editEl && actionsEl) {
    textEl.style.display = 'none';
    editEl.style.display = 'block';
    actionsEl.style.display = 'flex';
    editEl.focus();
  }
}

function saveCommentEdit(taskId, scope, index) {
  var tasks = scope === 'work' ? WORK_TASKS : PERSONAL_TASKS;
  var task = tasks.find(function(t) { return t.id === taskId; });
  if (task && task.comments && task.comments[index]) {
    var editEl = document.getElementById('comment-edit-'+scope+'-'+taskId+'-'+index);
    task.comments[index].text = editEl.value;
    saveState();
    scope === 'work' ? renderWorkBoard() : renderPersonalBoard();
  }
}

function cancelCommentEdit(taskId, scope, index) {
  var textEl = document.getElementById('comment-text-'+scope+'-'+taskId+'-'+index);
  var editEl = document.getElementById('comment-edit-'+scope+'-'+taskId+'-'+index);
  var actionsEl = document.getElementById('comment-edit-actions-'+scope+'-'+taskId+'-'+index);
  if (textEl && editEl && actionsEl) {
    textEl.style.display = 'block';
    editEl.style.display = 'none';
    actionsEl.style.display = 'none';
  }
}

function toggleCommentExpand(taskId) {
  var feed = document.querySelectorAll('[id^="comment-feed-"][id$="-'+taskId+'"]')[0];
  if (feed) feed.classList.toggle('expanded');
}

var STORAGE_KEY_WORK = 'dcc_work_tasks';
var STORAGE_KEY_PERSONAL = 'dcc_personal_tasks';
var STORAGE_KEY_IDS = 'dcc_next_ids';

function dedup(tasks) {
  var seen = {};
  return tasks.filter(function(t) {
    if (seen[t.id]) return false;
    seen[t.id] = true;
    return true;
  });
}

function saveState() {
  localStorage.setItem(STORAGE_KEY_WORK, JSON.stringify(WORK_TASKS));
  localStorage.setItem(STORAGE_KEY_PERSONAL, JSON.stringify(PERSONAL_TASKS));
  localStorage.setItem(STORAGE_KEY_IDS, JSON.stringify({ nextWorkId: nextWorkId, nextPersonalId: nextPersonalId }));
  updateSyncTime();
}

function loadState() {
  var work = localStorage.getItem(STORAGE_KEY_WORK);
  if (work) {
    WORK_TASKS = JSON.parse(work);
    WORK_TASKS = dedup(WORK_TASKS);
  }
  var personal = localStorage.getItem(STORAGE_KEY_PERSONAL);
  if (personal) {
    PERSONAL_TASKS = JSON.parse(personal);
    PERSONAL_TASKS = dedup(PERSONAL_TASKS);
  }
  var ids = localStorage.getItem(STORAGE_KEY_IDS);
  if (ids) {
    var parsed = JSON.parse(ids);
    nextWorkId = parsed.nextWorkId || 1;
    nextPersonalId = parsed.nextPersonalId || 1;
  }
  if (WORK_TASKS.length > 0 || PERSONAL_TASKS.length > 0) {
    renderWorkBoard();
  }
}

function updateSyncTime() {
  LAST_SYNC = new Date().toLocaleTimeString('en-US', { timeStyle: 'short' });
  document.getElementById('syncTime').textContent = 'Synced ' + LAST_SYNC;
}

function toggleTheme() {
  var isDark = document.body.classList.toggle('light');
  var btn = document.getElementById('themeToggle');
  btn.textContent = isDark ? 'Dark' : 'Light';
  localStorage.setItem('dcc_theme', isDark ? 'light' : 'dark');
}

function loadTheme() {
  var theme = localStorage.getItem('dcc_theme') || 'dark';
  if (theme === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeToggle').textContent = 'Dark';
  } else {
    document.body.classList.remove('light');
    document.getElementById('themeToggle').textContent = 'Light';
  }
}

// Init
loadTheme();
loadState();
renderWorkBoard();
updateAlerts();

// Auto-reload every 60 seconds
setInterval(function() { location.reload(); }, 60000);

// Restore last active tab
try {
  var savedTab = localStorage.getItem('coolhits_activeTab');
  if (savedTab) switchTab(savedTab);
} catch(e) {}
</script>
